name: Deploy Backend to cPanel

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, xml, bcmath, curl, fileinfo, gd, zip

      - name: Prepare directories
        working-directory: backend
        run: |
          mkdir -p bootstrap/cache storage/framework/{cache,sessions,views} storage/logs
          chmod -R 775 bootstrap/cache storage

      - name: Remove duplicate files
        working-directory: backend
        run: |
          rm -f app/Http/Resources/BookingResource_updated.php

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Prepare public for subdomain
        run: |
          mkdir -p deploy-public
          cp -r backend/public/* deploy-public/
          cat > deploy-public/index.php << 'PHPEOF'
          <?php

          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          // Determine if the application is in maintenance mode...
          if (file_exists($maintenance = __DIR__.'/../incalake-api/storage/framework/maintenance.php')) {
              require $maintenance;
          }

          // Register the Composer autoloader...
          require __DIR__.'/../incalake-api/vendor/autoload.php';

          // Bootstrap Laravel and handle the request...
          (require_once __DIR__.'/../incalake-api/bootstrap/app.php')
              ->handleRequest(Request::capture());
          PHPEOF

      - name: Deploy app code
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.incalake.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: ./incalake-api/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/public/**
            **/storage/logs/*
            **/storage/framework/cache/data/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/*_updated.php

      - name: Deploy public files to subdomain
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.incalake.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy-public/
          server-dir: ./public_html/api.incalake.com/
