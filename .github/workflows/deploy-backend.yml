name: Deploy Backend to cPanel

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, xml, bcmath, curl, fileinfo, gd, zip

      - name: Prepare directories
        working-directory: backend
        run: |
          mkdir -p bootstrap/cache storage/framework/{cache,sessions,views} storage/logs
          chmod -R 775 bootstrap/cache storage

      - name: Remove duplicate files
        working-directory: backend
        run: |
          rm -f app/Http/Resources/BookingResource_updated.php

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Prepare public for subdomain
        run: |
          mkdir -p deploy-public
          cp -r backend/public/* deploy-public/
          cat > deploy-public/index.php << 'PHPEOF'
          <?php

          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          // Determine if the application is in maintenance mode...
          if (file_exists($maintenance = __DIR__.'/../incalake-api/storage/framework/maintenance.php')) {
              require $maintenance;
          }

          // Register the Composer autoloader...
          require __DIR__.'/../incalake-api/vendor/autoload.php';

          // Bootstrap Laravel and handle the request...
          (require_once __DIR__.'/../incalake-api/bootstrap/app.php')
              ->handleRequest(Request::capture());
          PHPEOF

      - name: Deploy app code
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.incalake.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: ./incalake-api/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/public/**
            **/storage/logs/*
            **/storage/framework/cache/data/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/*_updated.php

      - name: Deploy public files to subdomain
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.incalake.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy-public/
          server-dir: ./public_html/api.incalake.com/

      # FTP upload does NOT run artisan, so the server keeps serving the old
      # compiled Blade/config caches (this is why email fixes "didn't apply").
      # Hit the secret-gated deploy hook to clear them automatically.
      # Standalone script: deletes stale compiled views + cached config on
      # disk WITHOUT booting Laravel (immune to sanctum / cached config).
      # Best-effort: the FTP upload already succeeded above. A transient
      # hiccup on this cache-bust curl must NOT mark the whole deploy as
      # failed (it was producing false red X's while the code shipped fine).
      - name: Purge server caches
        continue-on-error: true
        run: |
          echo "Purging caches on api.incalake.com ..."
          sleep 8   # let FTP settle
          code=$(curl -sS -o /tmp/purge.json -w "%{http_code}" \
            --max-time 60 --retry 3 --retry-delay 10 \
            "https://api.incalake.com/purge-cache.php?key=${{ secrets.DEPLOY_HOOK_KEY }}" || true)
          echo "HTTP $code"; cat /tmp/purge.json 2>/dev/null || true; echo
          if [ "$code" != "200" ]; then
            echo "::warning::Cache purge returned HTTP $code (non-fatal). Run purge-cache.php manually if needed."
          fi
